<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statement Parser - Extract Transactions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 1000px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-section {
            margin-bottom: 40px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background-color: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background-color: #f0f2ff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: 500;
        }

        .upload-hint {
            color: #666;
            font-size: 14px;
        }

        .file-input {
            display: none;
        }

        .button {
            display: inline-block;
            padding: 12px 30px;
            margin-top: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .button:hover {
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results-section {
            display: none;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px solid #e0e0e0;
        }

        .results-section.show {
            display: block;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .results-header h2 {
            color: #333;
            font-size: 22px;
        }

        .transaction-count {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .extracted-text {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 13px;
            color: #666;
            border-left: 4px solid #667eea;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            background: #f8f9ff;
            color: #333;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 2px solid #e0e0e0;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            color: #666;
            font-size: 14px;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 30px;
            font-size: 14px;
        }

        .export-button {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            margin-top: 0;
        }

        .export-button:hover {
            opacity: 0.9;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #c33;
        }

        .error.show {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .upload-area {
                padding: 30px 20px;
            }

            .results-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .transaction-count {
                margin-top: 10px;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💳 Statement Parser</h1>
        <p class="subtitle">Extract transaction details from statement images or PDFs</p>

        <div class="error" id="errorMessage"></div>

        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📄</div>
                <div class="upload-text">Drag and drop your statement here</div>
                <div class="upload-hint">or click to browse (PDF or Image)</div>
                <button class="button">Choose File</button>
            </div>
            <input type="file" id="fileInput" class="file-input" accept=".pdf,.jpg,.jpeg,.png,.bmp,.gif">
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">Processing your statement...</p>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="results-header">
                <h2>Extracted Transactions</h2>
                <span class="transaction-count" id="transactionCount">0 transactions</span>
            </div>

            <div id="extractedText" class="extracted-text" style="display: none;"></div>

            <table id="transactionsTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody id="transactionsBody">
                    <tr class="empty-message">
                        <td colspan="3">No transactions extracted</td>
                    </tr>
                </tbody>
            </table>

            <button class="button export-button" id="exportBtn">📥 Export to CSV</button>
            <button class="button" id="resetBtn" style="background: #6b7280; margin-left: 10px;">↻ Process Another</button>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const resultsSection = document.getElementById('resultsSection');
        const errorMessage = document.getElementById('errorMessage');
        const exportBtn = document.getElementById('exportBtn');
        const resetBtn = document.getElementById('resetBtn');
        const transactionsBody = document.getElementById('transactionsBody');
        const transactionCount = document.getElementById('transactionCount');
        const extractedTextDiv = document.getElementById('extractedText');

        let currentTransactions = [];

        // Upload area clicks
        uploadArea.addEventListener('click', () => fileInput.click());

        // File input change
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                processFile(file);
            }
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                processFile(file);
            }
        });

        async function processFile(file) {
            errorMessage.classList.remove('show');
            
            // Validate file type
            const validTypes = ['application/pdf', 'image/jpeg', 'image/png', 'image/bmp', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                showError('Invalid file type. Please upload a PDF or image file.');
                return;
            }

            loading.style.display = 'block';
            resultsSection.classList.remove('show');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('http://localhost:5001/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    currentTransactions = data.transactions;
                    displayResults(data);
                } else {
                    showError(data.error || 'Error processing file');
                }
            } catch (error) {
                showError(`Error: ${error.message}. Make sure the Flask server is running on http://localhost:5001`);
            } finally {
                loading.style.display = 'none';
            }
        }

        function displayResults(data) {
            // Update transaction count
            transactionCount.textContent = `${data.transactions.length} transaction${data.transactions.length !== 1 ? 's' : ''}`;

            // Show extracted text if available
            if (data.extracted_text) {
                extractedTextDiv.textContent = 'Extracted Text: ' + data.extracted_text;
                extractedTextDiv.style.display = 'block';
            }

            // Populate table
            transactionsBody.innerHTML = '';
            if (data.transactions.length === 0) {
                transactionsBody.innerHTML = '<tr class="empty-message"><td colspan="3">No transactions found in the statement</td></tr>';
            } else {
                data.transactions.forEach(tx => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${escapeHtml(tx.date)}</td>
                        <td>${escapeHtml(tx.description)}</td>
                        <td>${escapeHtml(tx.amount)}</td>
                    `;
                    transactionsBody.appendChild(row);
                });
            }

            resultsSection.classList.add('show');
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        exportBtn.addEventListener('click', async () => {
            if (currentTransactions.length === 0) {
                showError('No transactions to export');
                return;
            }

            try {
                const response = await fetch('http://localhost:5001/export-csv', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ transactions: currentTransactions })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `transactions_${new Date().toISOString().split('T')[0]}.csv`;
                    a.click();
                    window.URL.revokeObjectURL(url);
                } else {
                    showError('Error exporting to CSV');
                }
            } catch (error) {
                showError(`Error exporting: ${error.message}`);
            }
        });

        resetBtn.addEventListener('click', () => {
            fileInput.value = '';
            currentTransactions = [];
            resultsSection.classList.remove('show');
            errorMessage.classList.remove('show');
            extractedTextDiv.style.display = 'none';
        });

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
